<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challengegrind Impossible Challenge List</title>
    <style>
        /* Стилизация скроллбара */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, #222, #3498db); 
            border-radius: 10px; 
            border: 2px solid #050505;
        }
        ::-webkit-scrollbar-thumb:hover { background: #3498db; }

        html { overflow-y: scroll; scroll-behavior: smooth; }
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            padding-top: 40px; overflow-x: hidden; width: 100%; box-sizing: border-box;
        }
        
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* Вкладки */
        .tabs-nav {
            display: flex; gap: 20px; margin-bottom: 30px; z-index: 10;
            background: rgba(255, 255, 255, 0.05); padding: 10px 20px;
            border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-btn {
            background: none; border: none; color: #888; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 5px 15px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .tab-btn.active { color: #3498db; background: rgba(52, 152, 219, 0.15); transform: scale(1.05); }

        .tab-content { display: none; width: 100%; max-width: 800px; z-index: 1; padding: 0 20px 40px 20px; box-sizing: border-box; }
        .tab-content.active { display: block; animation: tabAppear 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes tabAppear { 
            from { opacity: 0; transform: translateY(15px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        h1 { text-transform: uppercase; letter-spacing: 3px; font-style: italic; text-shadow: 0 0 15px #3498db; margin-bottom: 5px; text-align: center; }
        .subtitle { color: #888; margin-bottom: 40px; text-align: center; }

        /* Карточки уровней */
        .level-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px; margin-bottom: 15px; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(5px);
        }
        .level-card:hover { background: rgba(255, 255, 255, 0.07); border-color: rgba(52, 152, 219, 0.5); }
        
        .level-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .level-number { font-size: 28px; font-weight: bold; color: #3498db; min-width: 50px; transition: 0.3s; }
        .level-card.active .level-number { transform: scale(1.1); text-shadow: 0 0 10px #3498db; }

        .level-content { 
            max-height: 0; opacity: 0; transform: translateY(-10px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(0, 0, 0, 0.4); overflow: hidden; 
        }
        .level-card.active .level-content { max-height: 1000px; opacity: 1; transform: translateY(0); padding: 20px; }

        /* Иконки GD (падающие) */
        .gd-icon {
            position: fixed; top: -100px; width: 50px; height: 50px;
            background-image: url('https://gdbrowser.com/assets/icons/cube.png'); /* Спрайт кубов */
            background-size: cover; z-index: 0; pointer-events: none;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        /* Остальные стили */
        .stats-grid { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; color: #ccc; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; border-radius: 8px; overflow: hidden; background: #000; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .copy-btn { background: rgba(52, 152, 219, 0.1); border: 1px solid rgba(52, 152, 219, 0.3); color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .copy-btn:hover { background: rgba(52, 152, 219, 0.3); }

        .rule-card { background: #111; border-radius: 15px; padding: 25px; border: 1px solid #222; margin-bottom: 20px; transition: 0.3s; }
        .rule-card:hover { border-color: #3498db; }
        .tag { background: #000; border: 1px solid #fff; border-radius: 6px; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <h1>Challengegrind ICL</h1>
    <div class="subtitle">Owned by @verycoolprofile</div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab('list', this)">List</button>
        <button class="tab-btn" onclick="openTab('rules', this)">Rules</button>
    </div>

    <div id="list" class="tab-content active">
        <div id="levels-list"></div>
    </div>

    <div id="rules" class="tab-content">
        <!-- Тот же контент правил, что и раньше -->
        <div class="rule-card">
            <h3 style="display:flex; align-items:center; gap:10px;"><span style="background:#3498db; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px;">I</span> Общие правила</h3>
            <ul style="list-style:none; padding:0; color:#bbb; line-height:1.8;">
                <li>• Ограничение по <b>CPS: 16</b></li>
                <li>• Максимум <b>3 клика в 1 фрейме</b></li>
                <li>• TPS минимум <b>240</b> (если возможно)</li>
                <li>• Читы запрещены (кроме TPS Bypass)</li>
            </ul>
        </div>
        <div style="background: rgba(52, 152, 219, 0.1); border: 1px solid #3498db; padding: 15px; border-radius: 10px; text-align: center;">
            Для обновления рекордов пишите <a href="#" style="color:#3498db; text-decoration:none; font-weight:bold;">@verycoolprofile</a>
        </div>
    </div>

    <script>
        const levels = [
            { name: "HOCOK B CMETAHE", author: "mulpik", id: "138638436", wr: "None", min: "2%", tps: "9999", youtubeId: "r8gZdilpu5Q", tags: ["NME"] },
            { name: "Goddamn", author: "Oiloogd", id: "131023546", wr: "None", min: "2%", tps: "12193", youtubeId: "rOPAKjEsFKY" },
            { name: "Mig Never Clear", author: "verycoolprofile", id: "138844086", wr: "88%", min: "88%", tps: "240", youtubeId: "0CgbdftJW8o", tags: ["NME"] },
            { name: "Babydoll Perfect", author: "TururuTuturu", id: "134223826", wr: "12% by Pyro", min: "13%", tps: "333", youtubeId: "none" },
            { name: "Luua", author: "GmedeChubaka", id: "135797546", wr: "65% by Pyro", min: "65%", tps: "4944", youtubeId: "u_y65HlE-qA" },
            { name: "Firedust II", author: "GGbobr", id: "134760376", wr: "34% by Pyro", min: "36%", tps: "320", youtubeId: "none", tags: ["NME", "LTPS"] },
            { name: "Firedust IV", author: "Ggbobr", id: "136078246", wr: "None", min: "None", tps: "240", youtubeId: "6mU7eXW_Vsc" },
            { name: "Di3", author: "GmedeChubaka", id: "135653646", wr: "None", min: "13%", tps: "???", youtubeId: "none" },
            { name: "If p2p was 2p", author: "Itzbatlix", id: "135743274", wr: "None", min: "None", tps: "???", youtubeId: "none", tags: ["NME"] },
            { name: "RRRR", author: "levkalevka", id: "135543215", wr: "None", min: "7%", tps: "???", youtubeId: "none", tags: ["NME"] },
            { name: "Shadow Empathy", author: "Mrnekrongd", id: "135624161", wr: "None", min: "7%", tps: "???", youtubeId: "none", tags: ["NME"] },
            { name: "Nine Circles of P2P", author: "Itzbatlix", id: "135634595", wr: "None", min: "7%", tps: "???", youtubeId: "none" },
            { name: "Nine Circles of CEX II", author: "Itzbatlix", id: "135438326", wr: "19% by MTSgmd", min: "???", tps: "???", youtubeId: "none" }
        ];

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function renderLevels() {
            const container = document.getElementById('levels-list');
            levels.forEach((level, index) => {
                const rank = index + 1;
                const hasVideo = level.youtubeId && level.youtubeId !== "none";
                const card = document.createElement('div');
                card.className = `level-card ${rank <= 3 ? 'rank-' + rank : ''}`;
                card.innerHTML = `
                    <div class="level-header" onclick="toggleLevel(this.parentElement)">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div class="level-number">${rank}.</div>
                            <div>
                                <div class="level-name">${level.name}</div>
                                <div style="color:#888; font-size:14px;">by ${level.author}</div>
                            </div>
                        </div>
                        <div style="font-size:12px; color:#666;">
                            ID: ${level.id}
                            <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${level.id}', this)">📋</button>
                        </div>
                    </div>
                    <div class="level-content">
                        <div class="stats-grid">
                            <div>WR: ${level.wr} | Min: ${level.min}</div>
                            <div>TPS: ${level.tps}</div>
                        </div>
                        ${hasVideo ? `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${level.youtubeId}" frameborder="0" allowfullscreen></iframe></div>` : '<p style="text-align:center; color:#444;">Шоукейса нет</p>'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleLevel(card) {
            const isActive = card.classList.contains('active');
            document.querySelectorAll('.level-card').forEach(c => c.classList.remove('active'));
            if (!isActive) card.classList.add('active');
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            btn.innerHTML = '✓';
            setTimeout(() => btn.innerHTML = '📋', 1000);
        }

        // Падающие иконки GD
        function spawnIcon() {
            const icon = document.createElement('div');
            icon.className = 'gd-icon';
            
            // Случайная сторона (слева или справа)
            const side = Math.random() > 0.5 ? 'left' : 'right';
            const offset = Math.random() * 100;
            icon.style[side] = offset + 'px';
            
            // Случайный цвет через фильтр (чтобы не менять картинку)
            const hue = Math.floor(Math.random() * 360);
            icon.style.filter = `hue-rotate(${hue}deg) drop-shadow(0 0 5px rgba(255,255,255,0.5))`;
            
            // Случайная скорость падения
            const duration = Math.random() * 4 + 4;
            icon.style.animationDuration = duration + 's';

            document.body.appendChild(icon);
            setTimeout(() => icon.remove(), duration * 1000);
        }

        setInterval(spawnIcon, 5000);

        // Снег (оставляем твой красивый вариант)
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            flakes = Array.from({length: 120}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1, speed: Math.random() * 1 + 0.5, opacity: Math.random()
            }));
        }
        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flakes.forEach(f => {
                ctx.fillStyle = `rgba(255, 255, 255, ${f.opacity})`;
                ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
                f.y += f.speed; if (f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }

        window.onresize = initSnow;
        initSnow(); drawSnow(); renderLevels(); spawnIcon();
    </script>
</body>
</html>
