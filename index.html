<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challengegrind Impossible Challenge List</title>
    <style>
        /* Фикс прыжка контента: всегда резервируем место под скроллбар */
        html {
            overflow-y: scroll;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            /* Исправляем горизонтальный скролл */
            overflow-x: hidden; 
            width: 100%; /* Вместо 100vw используем 100%, чтобы не вылезать за границы */
            box-sizing: border-box;
        }
        
        /* Красивый тонкий скроллбар, чтобы не мозолил глаза */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3498db;
        }

        #snow-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-style: italic;
            text-shadow: 0 0 15px #3498db;
            margin-bottom: 5px;
            z-index: 1;
        }

        .subtitle { color: #888; margin-bottom: 40px; z-index: 1; text-align: center; }

        .list-container { 
            width: 100%; 
            max-width: 800px; 
            z-index: 1; 
            /* Фикс для предотвращения микро-изменений размера */
            box-sizing: border-box; 
        }

        .level-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
            backdrop-filter: blur(5px);
            width: 100%;
            box-sizing: border-box;
        }

        .level-card:hover { background: rgba(255, 255, 255, 0.07); transform: translateY(-2px); }

        .rank-1 { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.15); }
        .rank-1 .level-number { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .rank-2 { border-color: #c0c0c0; box-shadow: 0 0 15px rgba(192, 192, 192, 0.15); }
        .rank-2 .level-number { color: #c0c0c0; text-shadow: 0 0 10px #c0c0c0; }
        .rank-3 { border-color: #cd7f32; box-shadow: 0 0 15px rgba(205, 127, 50, 0.15); }
        .rank-3 .level-number { color: #cd7f32; text-shadow: 0 0 10px #cd7f32; }

        .level-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .level-info { display: flex; align-items: center; gap: 15px; }
        .level-number { font-size: 28px; font-weight: bold; color: #3498db; min-width: 50px; }
        .level-name { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .level-author { color: #aaa; font-size: 14px; }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #3498db; }

        .level-content {
            max-height: 0;
            transition: max-height 0.4s ease-out, padding 0.4s ease;
            background: rgba(0, 0, 0, 0.4);
            overflow: hidden;
            padding: 0 20px; /* Плавное появление паддинга */
        }

        .level-card.active .level-content { 
            max-height: 800px; 
            padding: 20px; 
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: #ccc;
        }

        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            border-radius: 8px; overflow: hidden; background: #000;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <h1>Challengegrind ICL</h1>
    <div class="subtitle">Owned by @verycoolprofile</div>

    <div id="levels-list" class="list-container"></div>

    <script>
        const levels = [
            {
                name: "HOCOK B CMETAHE",
                author: "mulpik",
                id: "138638436",
                wr: "None",
                min: "1%",
                tps: "9999",
                youtubeId: "r8gZdilpu5Q"
            },
            {
                name: "Goddamn",
                author: "Oiloogd",
                id: "131023546",
                wr: "None",
                min: "2%",
                tps: "12193",
                youtubeId: "rOPAKjEsFKY"
            },
            {
                name: "Mig Never Clear",
                author: "verycoolprofile",
                id: "138844086",
                wr: "88%",
                min: "88%",
                tps: "240",
                youtubeId: "0CgbdftJW8o"
            }
        ];

        const listContainer = document.getElementById('levels-list');

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const oldText = btn.innerHTML;
            btn.innerHTML = '✓';
            setTimeout(() => btn.innerHTML = oldText, 1000);
        }

        function renderLevels() {
            listContainer.innerHTML = '';
            levels.forEach((level, index) => {
                const rank = index + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                
                const card = document.createElement('div');
                card.className = `level-card ${rankClass}`;
                
                card.innerHTML = `
                    <div class="level-header" onclick="toggleLevel(this.parentElement)">
                        <div class="level-info">
                            <div class="level-number">${rank}.</div>
                            <div>
                                <div class="level-name">${level.name}</div>
                                <div class="level-author">by ${level.author}</div>
                            </div>
                        </div>
                        <div class="level-author">
                            ID: ${level.id}
                            <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${level.id}', this)">📋</button>
                        </div>
                    </div>
                    <div class="level-content">
                        <div class="stats-grid">
                            <div>WR: ${level.wr} | Min: ${level.min}</div>
                            <div style="text-align: right;">TPS: ${level.tps}</div>
                        </div>
                        <div class="video-wrapper">
                            <iframe src="https://www.youtube.com/embed/${level.youtubeId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function toggleLevel(clickedCard) {
            const allCards = document.querySelectorAll('.level-card');
            allCards.forEach(card => {
                if (card === clickedCard) {
                    card.classList.toggle('active');
                } else {
                    card.classList.remove('active'); // Закрываем остальные
                }
            });
        }

        // Снег
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            flakes = [];
            for (let i = 0; i < 100; i++) {
                flakes.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1, speed: Math.random() * 1 + 0.5, opacity: Math.random()
                });
            }
        }
        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            flakes.forEach(f => {
                ctx.globalAlpha = f.opacity;
                ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
                f.y += f.speed; if (f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }
        window.onresize = initSnow;
        initSnow(); drawSnow(); renderLevels();
    </script>
</body>
</html>
