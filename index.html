<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Impossible List</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #151515;
            --accent: #00e5ff;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        /* Список уровней */
        #levels-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .level-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s ease, border-color 0.2s ease;
            will-change: transform; /* Оптимизация для браузера */
        }

        .level-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* Шапка карточки с баннером */
        .level-header {
            padding: 20px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            min-height: 80px;
            transition: background-image 0.1s ease; /* Быстрая подмена баннера */
        }

        .level-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); /* Затемнение для читаемости текста */
            z-index: 1;
        }

        .header-info, .level-id-box {
            position: relative;
            z-index: 2;
        }

        .level-number {
            font-size: 24px;
            font-weight: 900;
            margin-right: 15px;
            color: var(--accent);
        }

        .level-title {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .level-author {
            font-size: 14px;
            color: #bbb;
        }

        /* Контент (скрытый по умолчанию) */
        .level-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.3s ease;
            background: rgba(0,0,0,0.2);
        }

        .level-card.active .level-content {
            max-height: 1000px; /* Достаточно большое число */
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .tag {
            background: var(--accent);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* YouTube Контейнер */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
            transition: transform 0.1s;
        }

        .copy-btn:active { transform: scale(1.2); }

        /* Специальные ранги */
        .rank-1 { border-left: 5px solid #ffd700; }
        .rank-2 { border-left: 5px solid #c0c0c0; }
        .rank-3 { border-left: 5px solid #cd7f32; }

    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <h1>Impossible List</h1>
        <div id="levels-list">
            <!-- Сюда JS вставит уровни -->
        </div>
    </div>

    <script>
        // ДАННЫЕ УРОВНЕЙ
        const levelsData = [
            { 
                "name": "HOCOK B CMETAHE", 
                "author": "mulpik", 
                "id": "138638436", 
                "bg": "HOCOKBCMETAHE.webp", 
                "wr": "None", "min": "2%", "tps": "9999", 
                "youtubeId": "r8gZdilpu5Q", 
                "tags": ["NME"] 
            },
            { 
                "name": "Goddamn", 
                "author": "Oiloogd", 
                "id": "131023546", 
                "bg": "Goddamn.webp", 
                "wr": "None", "min": "2%", "tps": "12193", 
                "youtubeId": "rOPAKjEsFKY" 
            },
            { 
                "name": "Mig Never Clear", 
                "author": "verycoolprofile", 
                "id": "138844086", 
                "bg": "", 
                "wr": "88%", "min": "88%", "tps": "240", 
                "youtubeId": "0CgbdftJW8o", 
                "tags": ["NME"] 
            }
        ];

        function renderLevels(data) {
            const container = document.getElementById('levels-list');
            container.innerHTML = '';
            
            data.forEach((level, index) => {
                const rank = index + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                
                // Пути к медиа
                const animPath = level.bg ? `banners/${level.bg}` : '';
                const staticPath = level.bg ? `banners/static/${level.bg.replace('.webp', '.png')}` : '';
                const bgStyle = staticPath ? `style="background-image: url('${staticPath}');"` : '';
                
                const card = document.createElement('div');
                card.className = `level-card ${rankClass}`;
                card.dataset.yt = level.youtubeId;
                card.dataset.anim = animPath;
                card.dataset.static = staticPath;
                
                card.innerHTML = `
                    <div class="level-header" ${bgStyle} 
                         onclick="toggleLevel(this.parentElement)"
                         onmouseenter="playAnim(this)" 
                         onmouseleave="stopAnim(this)">
                        <div class="header-info" style="display:flex; align-items:center;">
                            <div class="level-number">${rank}</div>
                            <div>
                                <div class="level-title">${level.name}</div>
                                <div class="level-author">by ${level.author}</div>
                            </div>
                        </div>
                        <div class="level-id-box" style="font-size:12px; color:rgba(255,255,255,0.6);">
                            ID: ${level.id}
                            <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${level.id}', this)">📋</button>
                        </div>
                    </div>
                    <div class="level-content">
                        <div class="stats-grid">
                            <div><b>WR:</b> ${level.wr} | <b>Min:</b> ${level.min}</div>
                            <div>
                                ${level.tags ? level.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''} 
                                <b>TPS:</b> ${level.tps}
                            </div>
                        </div>
                        <div class="video-container"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Логика баннеров (Картинка -> Анимация)
        function playAnim(header) {
            const animUrl = header.parentElement.dataset.anim;
            if (animUrl) header.style.backgroundImage = `url('${animUrl}')`;
        }

        function stopAnim(header) {
            const staticUrl = header.parentElement.dataset.static;
            if (staticUrl) header.style.backgroundImage = `url('${staticUrl}')`;
        }

        // Ленивая загрузка видео
        function toggleLevel(card) {
            const isActive = card.classList.contains('active');
            const videoContainer = card.querySelector('.video-container');
            const ytId = card.dataset.yt;

            // Закрываем другие и чистим их память
            document.querySelectorAll('.level-card').forEach(c => {
                if (c !== card) {
                    c.classList.remove('active');
                    c.querySelector('.video-container').innerHTML = '';
                }
            });

            card.classList.toggle('active');

            if (!isActive && ytId && ytId !== "none") {
                videoContainer.innerHTML = `
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" 
                                frameborder="0" allowfullscreen></iframe>
                    </div>`;
            } else {
                videoContainer.innerHTML = '';
            }
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            btn.innerHTML = '✓';
            setTimeout(() => btn.innerHTML = '📋', 1000);
        }

        // Снег (Оптимизированный)
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];

        function initSnow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            flakes = Array.from({length: 40}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.2,
                opacity: Math.random() * 0.3
            }));
        }

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            flakes.forEach(f => {
                ctx.globalAlpha = f.opacity;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                ctx.fill();
                f.y += f.speed;
                if (f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }

        window.onresize = initSnow;
        initSnow();
        drawSnow();
        renderLevels(levelsData);
    </script>
</body>
</html>
