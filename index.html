<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challengegrind ICL</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --accent: #00fbff;
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* Настройка снега */
        .snow-toggle {
            position: fixed; top: 20px; left: 20px;
            z-index: 100; background: rgba(0,0,0,0.7);
            padding: 10px; border-radius: 8px;
            font-size: 12px; border: 1px solid var(--accent);
        }

        .container { max-width: 950px; margin: 40px auto; padding: 0 20px; }

        .main-title {
            text-align: center; font-size: 48px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 251, 255, 0.6);
            margin-bottom: 30px;
        }

        /* Вкладки */
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .tab-btn {
            background: none; border: 2px solid var(--accent);
            color: var(--accent); padding: 10px 30px;
            cursor: pointer; font-weight: bold; border-radius: 5px;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Карточки уровней */
        .level-card {
            background: var(--card-bg); border-radius: 10px;
            margin-bottom: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .level-header {
            padding: 20px; cursor: pointer;
            background-size: cover; background-position: center;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; min-height: 90px;
        }

        .level-header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
        }

        .header-info { position: relative; z-index: 2; display: flex; align-items: center; }
        .level-number { font-size: 28px; font-weight: 900; color: var(--accent); margin-right: 20px; }

        .level-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.5s ease; /* Плавное открытие */
            background: rgba(255,255,255,0.02);
        }

        .level-card.active .level-content { max-height: 1200px; padding: 20px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .tag { background: #333; color: var(--accent); padding: 3px 8px; border-radius: 4px; font-size: 11px; margin-right: 5px; }

        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            border-radius: 8px; overflow: hidden; background: #000;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .copy-btn { background: none; border: none; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div class="snow-toggle">
        <label><input type="checkbox" id="lessSnow"> Less Snow</label>
    </div>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <div class="main-title">Challengegrind ICL</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('list', this)">LIST</button>
            <button class="tab-btn" onclick="openTab('rules', this)">RULES</button>
        </div>

        <!-- ВКЛАДКА ЛИСТА -->
        <div id="list" class="tab-content active">
            <div id="levels-list"></div>
        </div>

        <!-- ВКЛАДКА ПРАВИЛ -->
        <div id="rules" class="tab-content">
            <div style="background: var(--card-bg); padding: 30px; border-radius: 10px; line-height: 1.6;">
                <h2>Rules</h2>
                <ul>
                    <li>The level must be impossible for a human.</li>
                    <li>Noclip runs are not accepted as WR.</li>
                    <li>Macros must be converted 1:1.</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const levelsData = [
            { "name": "HOCOK B CMETAHE", "author": "mulpik", "id": "138638436", "bg": "HOCOKBCMETAHE.webp", "wr": "None", "min": "2%", "tps": "9999", "youtubeId": "r8gZdilpu5Q", "tags": ["NME"] },
            { "name": "Goddamn", "author": "Oiloogd", "id": "131023546", "bg": "Goddamn.webp", "wr": "None", "min": "2%", "tps": "12193", "youtubeId": "rOPAKjEsFKY" },
            { "name": "Mig Never Clear", "author": "verycoolprofile", "id": "138844086", "bg": "", "wr": "88%", "min": "88%", "tps": "240", "youtubeId": "0CgbdftJW8o", "tags": ["NME"] },
            { "name": "Babydoll Perfect", "author": "TururuTuturu", "id": "134223826", "bg": "", "wr": "12% by Pyro", "min": "13%", "tps": "333", "youtubeId": "Ao-eX3jhOUo" },
            { "name": "Luua", "author": "GmedeChubaka", "id": "135797546", "bg": "", "wr": "65% by Pyro", "min": "65%", "tps": "4944", "youtubeId": "none" },
            { "name": "Firedust II", "author": "GGbobr", "id": "134760376", "bg": "", "wr": "34% by Pyro", "min": "36%", "tps": "320", "youtubeId": "NtoRdrTl9lU", "tags": ["NME", "LTPS"] },
            { "name": "Firedust IV", "author": "Ggbobr", "id": "136078246", "bg": "", "wr": "None", "min": "None", "tps": "240", "youtubeId": "4TlBDQL_3GI", "tags": ["NME"] },
            { "name": "Di3", "author": "GmedeChubaka", "id": "135653646", "bg": "", "wr": "None", "min": "13%", "tps": "???", "youtubeId": "RFRiXOXs2YA" },
            { "name": "If p2p was 2p", "author": "Itzbatlix", "id": "135743274", "bg": "", "wr": "None", "min": "None", "tps": "???", "youtubeId": "none", "tags": ["NME"] },
            { "name": "RRRR", "author": "levkalevka", "id": "135543215", "bg": "", "wr": "None", "min": "7%", "tps": "???", "youtubeId": "none", "tags": ["NME"] },
            { "name": "Shadow Empathy", "author": "Mrnekrongd", "id": "135624161", "bg": "", "wr": "None", "min": "7%", "tps": "???", "youtubeId": "none", "tags": ["NME"] },
            { "name": "Nine Circles of P2P", "author": "Itzbatlix", "id": "135634595", "bg": "", "wr": "None", "min": "7%", "tps": "???", "youtubeId": "none" },
            { "name": "Nine Circles of CEX II", "author": "Itzbatlix", "id": "135438326", "bg": "", "wr": "19% by MTSgmd", "min": "???", "tps": "???", "youtubeId": "none" }
        ];

        function renderLevels(data) {
            const container = document.getElementById('levels-list');
            container.innerHTML = '';
            data.forEach((level, index) => {
                const rank = index + 1;
                const anim = level.bg ? `banners/${level.bg}` : '';
                const stat = level.bg ? `banners/static/${level.bg.replace('.webp', '.png')}` : '';
                
                const card = document.createElement('div');
                card.className = `level-card`;
                card.dataset.yt = level.youtubeId;
                card.dataset.anim = anim;
                card.dataset.static = stat;
                
                card.innerHTML = `
                    <div class="level-header" style="background-image: url('${stat}')" 
                         onclick="toggleLevel(this.parentElement)"
                         onmouseenter="playAnim(this)" onmouseleave="stopAnim(this)">
                        <div class="header-info">
                            <div class="level-number">${rank}</div>
                            <div>
                                <div style="font-size:20px; font-weight:bold;">${level.name}</div>
                                <div style="color:#aaa; font-size:14px;">by ${level.author}</div>
                            </div>
                        </div>
                        <div style="position:relative; z-index:2; font-size:12px;">
                            ID: ${level.id} <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${level.id}', this)">📋</button>
                        </div>
                    </div>
                    <div class="level-content">
                        <div class="stats-grid">
                            <div><b>WR:</b> ${level.wr} | <b>Min:</b> ${level.min}</div>
                            <div>${level.tags ? level.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''} <b>TPS:</b> ${level.tps}</div>
                        </div>
                        <div class="video-container"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function playAnim(h) { const a = h.parentElement.dataset.anim; if(a) h.style.backgroundImage = `url('${a}')`; }
        function stopAnim(h) { const s = h.parentElement.dataset.static; if(s) h.style.backgroundImage = `url('${s}')`; }

        function toggleLevel(card) {
            const isActive = card.classList.contains('active');
            const yt = card.dataset.yt;
            document.querySelectorAll('.level-card').forEach(c => { 
                c.classList.remove('active'); 
                c.querySelector('.video-container').innerHTML = ''; 
            });
            if (!isActive) {
                card.classList.add('active');
                if (yt && yt !== "none") {
                    card.querySelector('.video-container').innerHTML = `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${yt}?autoplay=1" frameborder="0" allowfullscreen></iframe></div>`;
                }
            }
        }

        function openTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function copyToClipboard(t, b) { navigator.clipboard.writeText(t); b.innerHTML = '✓'; setTimeout(() => b.innerHTML = '📋', 1000); }

        // Снег с настройкой
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        const toggle = document.getElementById('lessSnow');
        let flakes = [];

        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const count = toggle.checked ? 15 : 60; // Настройка количества
            flakes = Array.from({length: count}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1, speed: Math.random() * 1 + 0.5, opacity: Math.random() * 0.5
            }));
        }

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            flakes.forEach(f => {
                ctx.globalAlpha = f.opacity;
                ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
                f.y += f.speed; if (f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }

        toggle.addEventListener('change', initSnow);
        window.onresize = initSnow;
        initSnow(); drawSnow(); renderLevels(levelsData);
    </script>
</body>
</html>
