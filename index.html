<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challengegrind Impossible Challenge List</title>
    <style>
        /* Твой стильный скроллбар */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, #222, #3498db); 
            border-radius: 10px; 
            border: 2px solid #050505;
        }

        html { overflow-y: scroll; scroll-behavior: smooth; }
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 700; /* Жирный шрифт для всего сайта */
            margin: 0; display: flex; flex-direction: column; align-items: center;
            padding-top: 40px; overflow-x: hidden; width: 100%; box-sizing: border-box;
        }
        
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* Вкладки */
        .tabs-nav {
            display: flex; gap: 20px; margin-bottom: 30px; z-index: 10;
            background: rgba(255, 255, 255, 0.05); padding: 10px 20px;
            border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-btn {
            background: none; border: none; color: #888; font-size: 18px;
            font-weight: 900; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 5px 15px; border-radius: 8px; text-transform: uppercase;
        }
        .tab-btn.active { color: #3498db; background: rgba(52, 152, 219, 0.15); transform: scale(1.05); }

        .tab-content { display: none; width: 100%; max-width: 800px; z-index: 2; padding: 0 20px 40px 20px; box-sizing: border-box; }
        .tab-content.active { display: block; animation: tabAppear 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes tabAppear { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h1 { text-transform: uppercase; letter-spacing: 3px; font-style: italic; text-shadow: 0 0 15px #3498db; text-align: center; }
        .subtitle { color: #888; margin-bottom: 40px; text-align: center; }

        /* Карточки уровней и ТОП-3 */
        .level-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px; margin-bottom: 15px; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(5px);
        }
        .level-card:hover { background: rgba(255, 255, 255, 0.07); }

        .rank-1 { border: 2px solid #ffd700 !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .rank-2 { border: 2px solid #c0c0c0 !important; box-shadow: 0 0 20px rgba(192, 192, 192, 0.2); }
        .rank-3 { border: 2px solid #cd7f32 !important; box-shadow: 0 0 20px rgba(205, 127, 50, 0.2); }
        
        .level-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .level-number { font-size: 28px; font-weight: 900; color: #3498db; min-width: 50px; }
        .rank-1 .level-number { color: #ffd700; }
        .rank-2 .level-number { color: #c0c0c0; }
        .rank-3 .level-number { color: #cd7f32; }

        .level-content { max-height: 0; opacity: 0; transition: all 0.5s ease; background: rgba(0, 0, 0, 0.5); overflow: hidden; }
        .level-card.active .level-content { max-height: 1000px; opacity: 1; padding: 20px; }

        /* Падающие иконки GD */
        .gd-icon {
            position: fixed; top: -100px; width: 60px; height: 60px;
            background: url('https://gdbrowser.com/assets/icons/cube.png') no-repeat center;
            background-size: contain; z-index: 1; pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        .stats-grid { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid rgba(255,255,255,0.1); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .tag { background: #000; border: 1px solid #fff; border-radius: 6px; padding: 2px 6px; font-size: 10px; margin-left: 5px; }
        .copy-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <h1>Challengegrind ICL</h1>
    <div class="subtitle">Owned by @verycoolprofile</div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab('list', this)">List</button>
        <button class="tab-btn" onclick="openTab('rules', this)">Rules</button>
    </div>

    <div id="list" class="tab-content active">
        <div id="loading-text" style="text-align:center; color:#3498db;">Загрузка уровней с Pastebin...</div>
        <div id="levels-list"></div>
    </div>

    <div id="rules" class="tab-content">
        <div style="background: #111; border-radius: 15px; padding: 25px; border: 1px solid #222;">
            <h3 style="color:#3498db; text-transform:uppercase; margin-top:0;">Правила:</h3>
            <ul style="list-style:none; padding:0; line-height:2.2;">
                <li>• Ограничение по <b>CPS: 16</b></li>
                <li>• Больше <b>3 кликов в 1 фрейме</b> запрещено</li>
                <li>• TPS минимум <b>240</b> (если возможно)</li>
                <li>• Читы запрещены (кроме <b>TPS Bypass</b>)</li>
                <li>• TPS выше <b>100к</b> запрещено</li>
            </ul>
        </div>
    </div>

    <script>
        // ВСТАВЬ СВОЮ ССЫЛКУ С PASTEBIN СЮДА (ОБЯЗАТЕЛЬНО RAW!)
        const PASTEBIN_URL = 'https://pastebin.com/raw/ВАШ_ID'; 

        async function loadLevels() {
            try {
                // Если ссылки еще нет, используем временные данные, чтобы ничего не ломалось
                let data;
                if (PASTEBIN_URL.includes('ВАШ_ID')) {
                    data = [
                        { name: "HOCOK B CMETAHE", author: "mulpik", id: "138638436", wr: "None", min: "2%", tps: "9999", youtubeId: "r8gZdilpu5Q", tags: ["NME"] },
                        { name: "Goddamn", author: "Oiloogd", id: "131023546", wr: "None", min: "2%", tps: "12193", youtubeId: "rOPAKjEsFKY" },
                        { name: "Mig Never Clear", author: "verycoolprofile", id: "138844086", wr: "88%", min: "88%", tps: "240", youtubeId: "0CgbdftJW8o", tags: ["NME"] }
                    ];
                    console.log("Используются встроенные данные. Замените PASTEBIN_URL.");
                } else {
                    const response = await fetch(PASTEBIN_URL);
                    data = await response.json();
                }
                
                document.getElementById('loading-text').style.display = 'none';
                renderLevels(data);
            } catch (e) {
                document.getElementById('loading-text').innerHTML = "Ошибка загрузки данных. Проверьте ссылку.";
            }
        }

        function renderLevels(data) {
            const container = document.getElementById('levels-list');
            container.innerHTML = '';
            data.forEach((level, index) => {
                const rank = index + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
                const hasVideo = level.youtubeId && level.youtubeId !== "none";
                
                const card = document.createElement('div');
                card.className = `level-card ${rankClass}`;
                card.innerHTML = `
                    <div class="level-header" onclick="toggleLevel(this.parentElement)">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div class="level-number">${rank}.</div>
                            <div>
                                <div style="font-size:20px; font-weight:900;">${level.name}</div>
                                <div style="color:#aaa; font-size:14px;">by ${level.author}</div>
                            </div>
                        </div>
                        <div style="font-size:12px;">
                            ID: ${level.id}
                            <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${level.id}', this)">📋</button>
                        </div>
                    </div>
                    <div class="level-content">
                        <div class="stats-grid">
                            <div>WR: ${level.wr} | Min: ${level.min}</div>
                            <div>${level.tags ? level.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''} TPS: ${level.tps}</div>
                        </div>
                        ${hasVideo ? `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${level.youtubeId}" frameborder="0" allowfullscreen></iframe></div>` : '<p style="text-align:center; color:#555;">Видео нет</p>'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleLevel(card) {
            const isActive = card.classList.contains('active');
            document.querySelectorAll('.level-card').forEach(c => c.classList.remove('active'));
            if (!isActive) card.classList.add('active');
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            btn.innerHTML = '✓';
            setTimeout(() => btn.innerHTML = '📋', 1000);
        }

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function spawnIcon() {
            const icon = document.createElement('div');
            icon.className = 'gd-icon';
            const side = Math.random() > 0.5 ? 'left' : 'right';
            icon.style[side] = (Math.random() * 60) + 'px';
            icon.style.filter = `hue-rotate(${Math.random() * 360}deg) drop-shadow(0 0 10px rgba(255,255,255,0.3))`;
            const duration = Math.random() * 3 + 5;
            icon.style.animationDuration = duration + 's';
            document.body.appendChild(icon);
            setTimeout(() => icon.remove(), duration * 1000);
        }

        setInterval(spawnIcon, 5000);

        // Снег
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            flakes = Array.from({length: 100}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1, speed: Math.random() * 1 + 0.5, opacity: Math.random()
            }));
        }
        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flakes.forEach(f => {
                ctx.fillStyle = `rgba(255, 255, 255, ${f.opacity})`;
                ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
                f.y += f.speed; if (f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }

        window.onresize = initSnow;
        initSnow(); drawSnow(); loadLevels();
    </script>
</body>
</html>
