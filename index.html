<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challengegrind Impossible Challenge List</title>
    <style>
        /* Стили скроллбара */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, #222, #3498db); 
            border-radius: 10px; 
            border: 2px solid #050505;
        }

        html { overflow-y: scroll; scroll-behavior: smooth; }
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 700;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            padding-top: 40px; overflow-x: hidden; width: 100%; box-sizing: border-box;
        }
        
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .snow-control {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(255, 255, 255, 0.05); padding: 8px 15px;
            border-radius: 10px; backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 152, 219, 0.3);
            font-size: 12px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
        }

        .tabs-nav {
            display: flex; gap: 20px; margin-bottom: 30px; z-index: 10;
            background: rgba(255, 255, 255, 0.05); padding: 10px 20px;
            border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-btn {
            background: none; border: none; color: #888; font-size: 18px;
            font-weight: 900; cursor: pointer; transition: 0.4s; 
            padding: 5px 15px; border-radius: 8px; text-transform: uppercase;
        }
        .tab-btn.active { color: #3498db; background: rgba(52, 152, 219, 0.15); transform: scale(1.05); }

        .tab-content { display: none; width: 100%; max-width: 800px; z-index: 2; padding: 0 20px 40px 20px; box-sizing: border-box; }
        .tab-content.active { display: block; }

        h1 { text-transform: uppercase; letter-spacing: 3px; font-style: italic; text-shadow: 0 0 15px #3498db; text-align: center; }

        /* КАРТОЧКА */
        .level-card {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px; margin-bottom: 15px; overflow: hidden;
            transition: border 0.3s, box-shadow 0.3s; 
            position: relative;
            backdrop-filter: blur(5px);
        }

        .rank-1 { border: 2px solid #ffd700 !important; }
        .rank-2 { border: 2px solid #c0c0c0 !important; }
        .rank-3 { border: 2px solid #cd7f32 !important; }
        
        .level-header { 
            padding: 20px; display: flex; align-items: center; 
            justify-content: space-between; cursor: pointer;
            position: relative; z-index: 1;
            min-height: 90px; /* Фиксированная высота для стабильности фона */
            box-sizing: border-box;
            background-size: cover !important; 
            background-position: center !important;
            background-repeat: no-repeat !important;
            transition: none !important; /* Мгновенная смена картинки */
        }

        /* Затемнение хедера для читаемости */
        .level-header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(5, 5, 5, 0.85) 0%, rgba(5, 5, 5, 0.3) 100%);
            z-index: -1;
        }

        .level-number { font-size: 28px; font-weight: 900; color: #3498db; min-width: 50px; }
        .rank-1 .level-number { color: #ffd700; }
        .rank-2 .level-number { color: #c0c0c0; }
        .rank-3 .level-number { color: #cd7f32; }

        /* ПЛАВНАЯ АНИМАЦИЯ КОНТЕНТА */
        .level-content { 
            max-height: 0; 
            opacity: 0; 
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1), opacity 0.3s ease; 
            background: rgba(0, 0, 0, 0.8); 
            overflow: hidden; 
        }

        .level-card.active .level-content { 
            max-height: 600px; 
            opacity: 1; 
            padding: 20px;
            transition: max-height 0.4s ease-in-out, opacity 0.5s ease;
        }

        .stats-grid { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .tag { background: #000; border: 1px solid #fff; border-radius: 6px; padding: 2px 6px; font-size: 10px; margin-left: 5px; }
        .copy-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .rule-box { border-radius: 15px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <label class="snow-control">
        <input type="checkbox" id="optimize-snow"> Optimize snow
    </label>

    <canvas id="snow-canvas"></canvas>

    <h1>Challengegrind ICL</h1>
    <div style="color: #888; margin-bottom: 40px; text-align: center;">Owned by @verycoolprofile</div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab('list', this)">List</button>
        <button class="tab-btn" onclick="openTab('rules', this)">Rules</button>
    </div>

    <div id="list" class="tab-content active">
        <div id="levels-list"></div>
    </div>

    <div id="rules" class="tab-content">
        <div class="rule-box" style="background: linear-gradient(to right, rgba(17, 17, 17, 1), rgba(52, 152, 219, 0.2)); margin-bottom: 20px;">
            <h3 style="color:#3498db; text-transform:uppercase; margin-top:0;">Правила:</h3>
            <ul style="list-style:none; padding:0; line-height:2.2;">
                <li>• Ограничение по <b>CPS: 16</b></li>
                <li>• Больше <b>3 кликов в 1 фрейме</b> запрещено</li>
                <li>• TPS минимум <b>240</b></li>
                <li>• Читы запрещены</li>
                <li>• TPS выше <b>100к</b> запрещено</li>
            </ul>
        </div>
    </div>

    <script>
        const levelsData = [
            { "name": "HOCOK B CMETAHE", "author": "mulpik", "id": "138638436", "bg": "HOCOKBCMETAHE.webp", "wr": "None", "min": "2%", "tps": "9999", "youtubeId": "r8gZdilpu5Q", "tags": ["NME"] },
            { "name": "Goddamn", "author": "Oiloogd", "id": "131023546", "bg": "Goddamn.webp", "wr": "None", "min": "2%", "tps": "12193", "youtubeId": "rOPAKjEsFKY" },
            { "name": "Mig Never Clear", "author": "verycoolprofile", "id": "138844086", "bg": "", "wr": "88%", "min": "88%", "tps": "240", "youtubeId": "0CgbdftJW8o", "tags": ["NME"] },
            { "name": "Babydoll Perfect", "author": "TururuTuturu", "id": "134223826", "bg": "", "wr": "12% by Pyro", "min": "13%", "tps": "333", "youtubeId": "Ao-eX3jhOUo" }
        ];

        function renderLevels(data) {
            const container = document.getElementById('levels-list');
            container.innerHTML = '';
            data.forEach((level, index) => {
                const rank = index + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
                
                const animImg = level.bg ? `banners/${level.bg}` : '';
                const staticImg = level.bg ? `banners/static/${level.bg.replace('.webp', '.png')}` : '';
                
                const card = document.createElement('div');
                card.className = `level-card ${rankClass}`;
                card.dataset.yt = level.youtubeId;
                card.dataset.anim = animImg;
                card.dataset.static = staticImg;

                card.innerHTML = `
                    <div class="level-header" 
                         style="background-image: url('${staticImg || ''}')"
                         onmouseenter="playGif(this)" 
                         onmouseleave="stopGif(this)"
                         onclick="toggleLevel(this.parentElement)">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div class="level-number">${rank}.</div>
                            <div>
                                <div style="font-size:18px; font-weight:900; text-shadow: 2px 2px 5px #000;">${level.name}</div>
                                <div style="color:#ccc; font-size:13px; text-shadow: 1px 1px 3px #000;">by ${level.author}</div>
                            </div>
                        </div>
                        <div style="font-size:11px; text-shadow: 1px 1px 3px #000; position:relative; z-index:2;">
                            ID: ${level.id}
                            <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${level.id}', this)">📋</button>
                        </div>
                    </div>
                    <div class="level-content">
                        <div class="stats-grid">
                            <div>WR: ${level.wr} | Min: ${level.min}</div>
                            <div>${level.tags ? level.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''} TPS: ${level.tps}</div>
                        </div>
                        <div class="video-container"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function playGif(header) {
            const anim = header.parentElement.dataset.anim;
            if(anim) header.style.backgroundImage = `url('${anim}')`;
        }

        function stopGif(header) {
            const static = header.parentElement.dataset.static;
            if(static) header.style.backgroundImage = `url('${static}')`;
        }

        function toggleLevel(card) {
            const isActive = card.classList.contains('active');
            
            document.querySelectorAll('.level-card').forEach(c => {
                if(c !== card) {
                    c.classList.remove('active');
                    setTimeout(() => {
                        if(!c.classList.contains('active')) c.querySelector('.video-container').innerHTML = '';
                    }, 400);
                }
            });

            if (!isActive) {
                card.classList.add('active');
                const videoContainer = card.querySelector('.video-container');
                const ytId = card.dataset.yt;
                if (ytId && ytId !== "none") {
                    videoContainer.innerHTML = `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" frameborder="0" allowfullscreen></iframe></div>`;
                }
            } else {
                card.classList.remove('active');
            }
        }

        function copyToClipboard(text, btn) { navigator.clipboard.writeText(text); btn.innerHTML = '✓'; setTimeout(() => btn.innerHTML = '📋', 1000); }
        
        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active'); btn.classList.add('active');
        }

        const canvas = document.getElementById('snow-canvas'); const ctx = canvas.getContext('2d');
        const snowOpt = document.getElementById('optimize-snow'); let flakes = [];
        
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const count = snowOpt.checked ? 20 : 100;
            flakes = Array.from({length: count}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1, speed: Math.random() * 1 + 0.5, opacity: Math.random()
            }));
        }
        
        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flakes.forEach(f => {
                ctx.fillStyle = `rgba(255, 255, 255, ${f.opacity})`; ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
                f.y += f.speed; if (f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }
        
        snowOpt.addEventListener('change', initSnow); window.onresize = initSnow;
        initSnow(); drawSnow(); renderLevels(levelsData);
    </script>
</body>
</html>
